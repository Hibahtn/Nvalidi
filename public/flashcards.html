<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nvalidi - Flash Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/Nvalidi/assets/css/flashcards.css">
    <link rel="stylesheet" href="/Nvalidi/assets/css/dash.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo"><a href="/Nvalidi/public/acceuil.html#home">NVAL<span>IDI</span></a></div>
        <ul class="sidebar-menu">
            <li><a href="/Nvalidi/public/dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="/Nvalidi/public/todo.html"><i class="fas fa-tasks"></i> To Do List</a></li>
            <li><a href="/Nvalidi/public/flashcards.html" class="active"><i class="fas fa-layer-group"></i> Flashcards</a></li>
            <li><a href="/Nvalidi/public/memory.html"><i class="fas fa-gamepad"></i> Jeux Mémoire</a></li>
            <li><a href="/Nvalidi/public/calcul.html"><i class="fas fa-calculator"></i> Calcul Moyenne</a></li>
            <li><a href="/Nvalidi/public/settings.html"><i class="fas fa-cog"></i> Paramètres</a></li>
        </ul>
        <a href="/Nvalidi/public/acceuil.html" class="logout-link"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
    </nav>
    <div class="main-content">
        <header class="dash-header">
            <div class="profile-btn" onclick="window.location.href='profile.html'"><span>Mon Profile</span><i class="fas fa-user-circle fa-lg"></i></div>
        </header>
        <div class="content-area">
            <div class="welcome-banner">
                <h1>Mes Flashcards <span><i class="fas fa-layer-group card-icon"></i></span></h1>
                <p>Retourne les cartes pour tester tes connaissances avant les examens.</p>
            </div>
            <div class="filters-bar">
                <select id="filterMatiere">
                    <option value="all">Toutes les matières</option>
                </select>
                <select id="filterOrder">
                    <option value="recent">Plus récentes</option>
                    <option value="oldest">Plus anciennes</option>
                    <option value="az">A → Z</option>
                </select>
                <button id="resetFilters">
                    <i class="fas fa-rotate-left"></i> Tout afficher
                </button>
                <button id="selectModeBtn">
                    <i class="fas fa-check-square"></i> Sélectionner
                </button>
            </div>
            <div class="selection-bar" id="selectionBar" style="display:none;">
                <button id="selectAllBtn"><i class="fas fa-check-double"></i> Tout sélectionner</button>
                <button id="deleteSelectedBtn" class="btn-danger"><i class="fas fa-trash"></i> Supprimer (<span id="selectedCount">0</span>)</button>
                <button id="cancelSelectBtn"><i class="fas fa-times"></i> Annuler</button>
            </div>
            <div class="cards-grid">
                <div class="add-card-placeholder">
                    <i class="fas fa-plus-circle"></i>
                    <p>Créer une nouvelle carte</p>
                </div>
            </div>
        </div>
    </div>
    <div id="cardModal" class="modal">
        <div class="modal-content">
            <h2>Nouvelle Flashcard <span><i class="fas fa-lightbulb"></i></span></h2>
        
            <div class="input-group">
                <label>Matière</label>
                <input type="text" id="subject" placeholder="ex: Développement Web...">
            </div>

            <div class="input-group">
                <label>Question</label>
                <textarea id="question" placeholder="Écris ta question ici..."></textarea>
            </div>

            <div class="input-group">
                <label>Réponse</label>
                <textarea id="answer" placeholder="Écris la réponse ici..."></textarea>
            </div>

            <div class="modal-buttons">
                <button id="cancelBtn" class="btn-secondary">Annuler</button>
                <button id="saveBtn" class="btn-primary">Créer la carte</button>
            </div>
        </div>
    </div>
    <script src="../assets/js/flashcards.js"></script>
</body>
</html>
