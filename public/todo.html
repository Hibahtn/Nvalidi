<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nvalidi - To Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/dash.css">
    <link rel="stylesheet" href="../assets/css/todo.css?v=2">
</head>
<body>
    <nav class="sidebar">
        <div class="logo"><a href="/Nvalidi/public/acceuil.html#home">NVAL<span>IDI</span></a></div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="todo.html" class="active"><i class="fas fa-tasks"></i> To Do List</a></li>
            <li><a href="flashcards.html"><i class="fas fa-layer-group"></i> Flashcards</a></li>
            <li><a href="memory.html"><i class="fas fa-gamepad"></i> Jeux Mémoire</a></li>
            <li><a href="calcul.html"><i class="fas fa-calculator"></i> Calcul Moyenne</a></li>
            <li><a href="settings.html"><i class="fas fa-cog"></i> Paramètres</a></li>
        </ul>
        <a href="acceuil.html" class="logout-link">
            <i class="fas fa-sign-out-alt"></i> Déconnexion
        </a>
    </nav>
    <div class="main-content">
        <header class="dash-header">
             <div class="profile-btn" onclick="window.location.href='profile.html'"><span>Mon Profil</span><i class="fas fa-user-circle fa-lg"></i></div>
        </header>
        <div class="content-area">
            <div class="welcome-banner" style="background: linear-gradient(135deg, var(--white) 0%, var(--primary-pink) 100%);">
                <h1>Ma To Do List <i class="fas fa-tasks card-icon"></i></h1>
                <p>Organise tes révisions et tes projets académiques ici.</p>
            </div>
            <div class="todo-container">
                <div class="todo-header">
                    <input type="text" class="todo-input" placeholder="Ajouter une tâche (ex: Réviser GDA)...">
                    <div class="priority-selector">
                        <div class="priority-option basse" data-priority="basse">Bas</div>
                        <div class="priority-option moyenne" data-priority="moyenne">Moy</div>
                        <div class="priority-option haute" data-priority="haute">Haut</div>
                    </div>
                    <button class="add-btn">Ajouter</button>
                </div>
                <div class="todo-filters">
                    <div class="filters-left">
                        <select class="filter-select" id="status-filter">
                            <option value="tous">Tous les status</option>
                            <option value="a_faire">À faire</option>
                            <option value="en_cours">En cours</option>
                            <option value="termine">Terminé</option>
                        </select>
                        <select class="filter-select" id="priority-filter">
                            <option value="tous">Toutes les priorités</option>
                            <option value="basse">Basse</option>
                            <option value="moyenne">Moyenne</option>
                            <option value="haute">Haute</option>
                        </select>
                        <select class="filter-select" id="sort-filter">
                            <option value="recent">Plus récent</option>
                            <option value="ancien">Plus ancien</option>
                            <option value="az">A → Z</option>
                            <option value="za">Z → A</option>
                        </select>
                    </div>
                    <div class="filters-right">
                        <button class="reset-filters-btn" id="reset-filters"><i class="fas fa-redo"></i> Tout afficher</button>
                        <button class="select-mode-btn" id="select-mode"><i class="fas fa-check-square"></i> Sélectionner</button>
                    </div>
                </div>
                <div class="selection-bar" id="selection-bar" style="display:none;">
                    <button class="sel-btn" id="select-all"><i class="fas fa-check-double"></i> Tout sélectionner</button>
                    <button class="sel-btn danger" id="delete-selected"><i class="fas fa-trash-alt"></i> Supprimer (0)</button>
                    <select class="filter-select" id="status-selected">
                        <option value="">statut</option>
                        <option value="a_faire">À faire</option>
                        <option value="en_cours">En cours</option>
                        <option value="termine">Terminé</option>
                    </select>
                    <select class="filter-select" id="priority-selected">
                        <option value="">priorité</option>
                        <option value="basse">Basse</option>
                        <option value="moyenne">Moyenne</option>
                        <option value="haute">Haute</option>
                    </select>
                    <button class="sel-btn cancel" id="cancel-select"><i class="fas fa-times"></i> Annuler</button>
                </div>
                <ul class="todo-list">
                </ul>
                <div class="empty-state">
                    <p>Bravo ! Tu es à jour dans tes tâches !</p>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/script.js"></script>
    <script src="../assets/js/todo.js"></script>
</body>
</html>
