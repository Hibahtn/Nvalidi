<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nvalidi - Paramètres</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/dash.css">
    <link rel="stylesheet" href="../assets/css/settings.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo"><a href="/Nvalidi/public/acceuil.html#home">NVAL<span>IDI</span></a></div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="todo.html"><i class="fas fa-tasks"></i> To Do List</a></li>
            <li><a href="flashcards.html"><i class="fas fa-layer-group"></i> Flashcards</a></li>
            <li><a href="memory.html"><i class="fas fa-gamepad"></i> Jeux Mémoire</a></li>
            <li><a href="calcul.html"><i class="fas fa-calculator"></i> Calcul Moyenne</a></li>
            <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> Paramètres</a></li>
        </ul>
        <a href="acceuil.html" class="logout-link"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
    </nav>
    <div class="main-content">
        <header class="dash-header">
           <div class="profile-btn" onclick="window.location.href='profile.html'">
               <span>Mon Profil</span>
               <i class="fas fa-user-circle fa-lg"></i>
           </div>
        </header>
        <div class="content-area">
            <div class="welcome-banner" style="background: linear-gradient(135deg, var(--white) 0%, var(--soft-grey) 100%); border: 1px solid var(--accent-blue);">
                <h1>Paramètres <i class="fas fa-cog"></i></h1>
                <p>Gérez votre compte et personnalisez votre expérience sur Nvalidi.</p>
            </div>
            <div class="settings-container">
                <div class="settings-card">
                    <h3><i class="fas fa-user-edit"></i> Informations Personnelles</h3>
                    <form class="settings-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nom Complet</label>
                                <input type="text" id="userName" value="Étudiante ISIMM" class="set-input">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="userEmail" value="etudiante@isimm.tn" class="set-input">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Niveau d'études</label>
                            <select id="userLevel" class="set-input">
                                <option value="L1">L1 Informatique</option>
                                <option value="L2">L2 Informatique</option>
                                <option value="L3">L3 Informatique</option>
                            </select>
                        </div>
                        <button type="button" id="saveProfileBtn" class="save-btn">Enregistrer les modifications</button>
                    </form>
                </div>
                <div class="settings-card">
                    <h3><i class="fas fa-lock"></i> Sécurité</h3>
                    <form class="settings-form">
                        <div class="form-group">
                            <label>Mot de passe actuel</label>
                            <input type="password" id="currentPassword" class="set-input" placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label>Nouveau mot de passe</label>
                            <input type="password" id="newPassword" placeholder="Minimum 8 caractères" class="set-input">
                        </div>
                        <button type="button" id="savePassBtn" class="save-btn secondary">Mettre à jour le mot de passe</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/settings.js"></script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
