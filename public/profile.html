<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nvalidi - Mon Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/dash.css">
    <link rel="stylesheet" href="../assets/css/profile.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo"><a href="/Nvalidi/public/acceuil.html#home">NVAL<span>IDI</span></a></div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="todo.html"><i class="fas fa-tasks"></i> To Do List</a></li>
            <li><a href="flashcards.html"><i class="fas fa-layer-group"></i> Flashcards</a></li>
            <li><a href="memory.html"><i class="fas fa-gamepad"></i> Jeux Mémoire</a></li>
            <li><a href="calcul.html"><i class="fas fa-calculator"></i> Calcul Moyenne</a></li>
            <li><a href="settings.html"><i class="fas fa-cog"></i> Paramètres</a></li>
        </ul>
        <a href="acceuil.html" class="logout-link"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
    </nav>
    <div class="main-content">
        <header class="dash-header">
            <a href="dashboard.html" class="profile-btn active-profile">
                <span>Mon Profile</span>
                <i class="fas fa-user-circle fa-lg"></i>
            </a>
        </header>
        <div class="content-area">
            <div class="profile-header">
                <div class="profile-info-main">
                    <div class="avatar-large">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="user-details">
                        <h1 id="profileNom">...</h1>
                        <p class="university">Institut Supérieur d'Informatique et de Mathématiques de Monastir</p>
                        <span class="badge" id="profileNiveau">...</span>
                    </div>
                </div>
            </div>
            <div class="profile-grid">
                <div class="profile-card contact-info">
                    <h3>Coordonnées</h3>
                    <ul>
                        <li><i class="fas fa-envelope"></i> <span id="profileEmail">...</span></li>
                        <li><i class="fas fa-id-card"></i> ID Étudiant: <span id="profileId">...</span></li>
                        <li><i class="fas fa-calendar-alt"></i> Inscrit depuis <span id="profileDate">...</span></li>
                    </ul>
                    <a href="settings.html" class="edit-profile-link">Modifier le profil</a>
                </div>
            </div>
        </div>
    </div>
    <script>
    fetch('../api/user.php')
        .then(r => r.json())
        .then(user => {
            // Infos de base
            document.getElementById('profileNom').textContent    = user.nom;
            document.getElementById('profileNiveau').textContent = user.niveau + ' Informatique';
            document.getElementById('profileEmail').textContent  = user.email;
            document.getElementById('profileId').textContent     = user.id;

            // Date d'inscription
            const date = new Date(user.created_at);
            const mois = date.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
            document.getElementById('profileDate').textContent = mois;
        });
    </script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
