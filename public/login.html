<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page de login </title>
    <link rel="stylesheet" href="../assets/css/auth.css">
    <script src="../assets/js/auth.js"></script>
</head>
<body>
<div class="container">
    <div class="form_area">
        <p class="title">LOGIN</p>
        <form action="">
            <div class="form_group">
                <label class="sub_title" for="email">Email</label>
                <input placeholder="Enter your email" id="email" class="form_style" type="email">
            </div>
            <div class="form_group">
                <label class="sub_title" for="password">Password</label>
                <input placeholder="Enter your password" id="password" class="form_style" type="password">
            </div>
            <div>
                <button type="button" id="loginSubmitBtn" class="btn">LOGIN</button>
                <p>You don't have an Account? <a class="link" href="register.html">Sign up Here!</a></p><br>
                <a href="acceuil.html" class="link" style="font-size: 0.8rem; opacity: 0.7;">← Retour à l'accueil</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
