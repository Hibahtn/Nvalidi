<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nvalidi - Inscription</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
<div class="container">
    <div class="form_area">
        <p class="title">S'inscrire</p>
        <form action="">
            <div class="form_group">
                <label class="sub_title" for="name">Nom Complet</label>
                <input placeholder="ahmed ben salah" id="name" class="form_style" type="text" required>
            </div>
            <div class="form_group">
                <label class="sub_title" for="email">Email étudiant</label>
                <input placeholder="utilisateur@isimm.u-monastir.tn" id="email" class="form_style" type="email" required>
            </div>
            <div class="form_group">
                <label class="sub_title" for="password">Mot de passe</label>
                <input placeholder="**************" id="password" class="form_style" type="password" required>
            </div>
            <div class="form_group">
                <label class="sub_title" for="confirm-password">Confirmer le mot de passe</label>
                <input placeholder="*************" id="confirm-password" class="form_style" type="password" required>
            </div>
            <div>
                <button class="btn">S'INSCRIRE</button>
                <p>Déjà un compte ? <a class="link" href="login.html">Se connecter ici!</a></p><br>
                <a href="acceuil.html" class="link" style="font-size: 0.8rem; opacity: 0.7;">← Retour à l'accueil</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
